<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Ocean-Tech Catalog{% endblock %}</title>
  <style>
    :root {
      --bg: #f4f7f9; --card: #fff; --ink: #1c2b36; --muted: #6b7c88;
      --line: #e1e8ed; --accent: #0a6e8c;
      --pending: #b5862a; --pending-bg: #fdf3df;
      --approved: #1f7a4d; --approved-bg: #e3f5ea;
      --rejected: #b23b3b; --rejected-bg: #fbe6e6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header.top {
      background: var(--ink); color: #fff; padding: 14px 24px;
      display: flex; align-items: baseline; gap: 14px;
    }
    header.top h1 { font-size: 18px; margin: 0; }
    header.top a { color: #cfe4ec; }
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px; }
    .flash { background: #fff7d6; border: 1px solid #e8d98a; padding: 10px 14px;
      border-radius: 8px; margin-bottom: 18px; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .filters a {
      padding: 6px 14px; border-radius: 999px; border: 1px solid var(--line);
      background: var(--card); color: var(--ink); font-size: 14px;
    }
    .filters a.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .filters a .n { opacity: .7; font-variant-numeric: tabular-nums; }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 10px;
      padding: 16px 18px; margin-bottom: 14px;
    }
    .card h3 { margin: 0 0 4px; font-size: 17px; }
    .card .desc { color: var(--ink); margin: 6px 0 10px; }
    .meta { color: var(--muted); font-size: 13px; }
    .badge {
      display: inline-block; font-size: 12px; font-weight: 600; padding: 2px 9px;
      border-radius: 999px; vertical-align: middle;
    }
    .badge.candidate { color: var(--pending); background: var(--pending-bg); }
    .badge.approved { color: var(--approved); background: var(--approved-bg); }
    .badge.rejected { color: var(--rejected); background: var(--rejected-bg); }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
    .chip {
      font-size: 12px; background: #eef3f6; color: #3a4d59;
      padding: 2px 9px; border-radius: 6px;
    }
    .facet-row { margin: 10px 0; }
    .facet-row .label { font-size: 12px; color: var(--muted); text-transform: uppercase;
      letter-spacing: .04em; margin-bottom: 3px; }
    .actions { display: flex; gap: 8px; margin-top: 12px; }
    button.btn {
      font: inherit; font-size: 14px; cursor: pointer; border: 1px solid var(--line);
      background: var(--card); padding: 6px 14px; border-radius: 7px; color: var(--ink);
    }
    button.btn:hover { border-color: var(--accent); }
    button.btn.approve { background: var(--approved-bg); border-color: #b6e0c6; color: var(--approved); }
    button.btn.reject { background: var(--rejected-bg); border-color: #ecc1c1; color: var(--rejected); }
    button.btn.approve:hover { background: #d3eede; }
    button.btn.reject:hover { background: #f6d6d6; }
    .empty { color: var(--muted); text-align: center; padding: 50px 0; }
    table.evi { width: 100%; border-collapse: collapse; font-size: 14px; }
    table.evi td { padding: 8px 10px; border-top: 1px solid var(--line); vertical-align: top; }
    table.evi .pub { color: var(--muted); white-space: nowrap; }
  </style>
</head>
<body>
  <header class="top">
    <h1>🌊 Ocean-Tech Catalog</h1>
    <a href="{{ url_for('index') }}">Review queue</a>
  </header>
  <div class="wrap">
    {% with messages = get_flashed_messages() %}
      {% if messages %}<div class="flash">{{ messages[0] }}</div>{% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
